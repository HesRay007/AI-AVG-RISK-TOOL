<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI AVG Risico Scanner</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Zorgt ervoor dat de React code in de browser werkt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS voor de styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons (Icoontjes) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- HTML2PDF voor de export functie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* Print specifieke styling */
        @media print {
            body { background-color: white !important; }
            .print\:hidden { display: none !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:m-0 { margin: 0 !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            .print\:break-inside-avoid { break-inside: avoid !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATIE VAN TOOLS EN REGELS ---
        const AI_TOOLS = [
          { 
            id: 'chatgpt_free', 
            name: 'ChatGPT (Gratis / Plus)', 
            dataTraining: true, 
            dpa: false,
            processingRisk: 'high',
            processingTerms: "OpenAI traint in de consumentenversies standaard op jouw prompts en uploads. Data wordt in de VS verwerkt. Er is geen sluitende AVG-verwerkersovereenkomst met de school, waardoor er een risico is dat ingevoerde gegevens door de AI gereproduceerd worden bij andere gebruikers.",
            safeUse: "Algemene lesvoorbereiding, brainstormen over didactiek, en vertalen of redigeren van algemene, openbare teksten.",
            unsafeUse: "Invoeren van namen van leerlingen, cijfers, ingeleverd studentenwerk (i.v.m. auteursrecht) of vertrouwelijke schooltoetsen."
          },
          { 
            id: 'copilot_edu', 
            name: 'Microsoft Copilot (met schoolaccount)', 
            dataTraining: false, 
            dpa: true,
            processingRisk: 'low',
            processingTerms: "Dankzij 'Commercial Data Protection' (via Entra ID) garandeert Microsoft dat data niet wordt opgeslagen en niet wordt gebruikt voor AI-training. Dit valt onder de robuuste, bestaande verwerkersovereenkomst van jullie instelling met dataopslag binnen de EU/EER.",
            safeUse: "Vrijwel alle onderwijstaken, inclusief het redigeren van correspondentie met basis persoonsgegevens (bijv. voornamen in e-mails).",
            unsafeUse: "Geautomatiseerd beoordelen (AI-Act restrictie) of het verwerken van bijzondere persoonsgegevens (zoals medische info/BSN) zonder specifieke DPIA."
          },
          { 
            id: 'claude', 
            name: 'Claude (Anthropic)', 
            dataTraining: true, 
            dpa: false,
            processingRisk: 'high',
            processingTerms: "Onder de standaard consumentenvoorwaarden kan Anthropic invoer gebruiken voor modeltraining. Opslag vindt plaats in de Verenigde Staten, wat leidt tot doorgifterisico's voor persoonsgegevens zonder formele DPA van de onderwijsinstelling.",
            safeUse: "Lange, openbare documenten of literatuur samenvatten en structureren zonder persoonsgegevens.",
            unsafeUse: "Uploaden van studentenwerk voor feedback (privacy en auteursrecht), of het delen van strategische schoolbeleidsstukken."
          },
          { 
            id: 'midjourney', 
            name: 'Midjourney', 
            dataTraining: true, 
            dpa: false,
            processingRisk: 'high',
            processingTerms: "Prompts en gegenereerde beelden zijn standaard openbaar in de Midjourney galerij. Het model traint continu verder op alle gebruikersinvoer. Visuele data is hierdoor fundamenteel onbeschermd.",
            safeUse: "Genereren van algemene, sfeervolle illustraties (bijv. 'een Romeinse markt') voor in lespresentaties met behulp van anonieme tekst-prompts.",
            unsafeUse: "Uploaden van foto's van leerlingen, docenten of het schoolgebouw als referentiemateriaal (image-to-image)."
          },
          { 
            id: 'heygen', 
            name: 'HeyGen', 
            dataTraining: true, 
            dpa: false,
            processingRisk: 'high',
            processingTerms: "Verwerkt biometrische data (stem/gezicht) op cloudservers wereldwijd. De standaardvoorwaarden sluiten AI-training niet uit en missen een specifieke EU-onderwijs-DPA.",
            safeUse: "Video's genereren met de kant-en-klare, standaard AI-avatars van HeyGen die algemene lesstof presenteren.",
            unsafeUse: "Klonen van de stem of het gezicht van jezelf, collega's of leerlingen zonder expliciete schriftelijke toestemming en FG-goedkeuring."
          },
          { 
            id: 'gamma', 
            name: 'Gamma.AI', 
            dataTraining: true, 
            dpa: false,
            processingRisk: 'high',
            processingTerms: "De standaardversie kent geen verwerkersovereenkomst voor Nederlands onderwijs. Data wordt veelal op Amerikaanse servers verwerkt en kan gebruikt worden om de dienstverlening te optimaliseren.",
            safeUse: "Genereren van snelle, visuele presentaties op basis van algemene theorie of geanonimiseerde steekwoorden.",
            unsafeUse: "Invoeren van interne schoolbeleidsstukken, of presentaties maken waarin namen van leerlingen voorkomen."
          },
          { 
            id: 'notebooklm', 
            name: 'NotebookLM (Google)', 
            dataTraining: false, 
            dpa: false,
            processingRisk: 'medium',
            processingTerms: "Hoewel Google aangeeft in NotebookLM géén basismodellen te trainen met jouw uploads, val je zonder expliciete afdekking in jullie Workspace-contract onder de consumentenvoorwaarden. De formele, juridische AVG-borging ontbreekt dan.",
            safeUse: "Uploaden van eigen (openbare) lesmaterialen, rapporten of boeken om deze als persoonlijke AI-assistent te bevragen.",
            unsafeUse: "Uploaden van ingeleverde verslagen van studenten (auteursrecht/privacy) of vertrouwelijke HR/zorg-dossiers."
          },
          { 
            id: 'genially', 
            name: 'Genially', 
            dataTraining: true, 
            dpa: false,
            processingRisk: 'medium',
            processingTerms: "Grotendeels Europees, maar bij een standaard (gratis) docentaccount ontbreekt vaak de formele Verwerkersovereenkomst. Data wordt gebruikt voor dienstoptimalisatie.",
            safeUse: "Ontwerpen van interactieve lesmodules en escape-rooms met algemene les-content.",
            unsafeUse: "Leerlingen verplichten accounts aan te maken (zonder contract), of namen/cijfers van studenten in de modules opnemen."
          },
          { 
            id: 'gemini_free', 
            name: 'Gemini (Gratis)', 
            dataTraining: true, 
            dpa: false,
            processingRisk: 'high',
            processingTerms: "Onder de consumentenvoorwaarden kunnen gesprekken door menselijke reviewers gelezen worden ter kwaliteitscontrole, en worden gebruikt voor AI-training. Een hoog risico op datalekken.",
            safeUse: "Snel actuele, algemene feiten opzoeken of brainstormen over didactiek zonder enige leerling- of schoolcontext.",
            unsafeUse: "Elke vorm van invoer met leerlingdata, ingeleverd werk, of bedrijfsvertrouwelijke informatie (zoals toetsvragen)."
          },
          { 
            id: 'gemini_edu', 
            name: 'Gemini (met schoolaccount)', 
            dataTraining: false, 
            dpa: true,
            processingRisk: 'low',
            processingTerms: "Bij gebruik via 'Google Workspace for Education' gelden de enterprise-voorwaarden. Geen AI-training op invoer, geen menselijke reviewers, en gedekt door de bestaande school-DPA.",
            safeUse: "Analyseren van documenten en opstellen van formatieve feedback (met dataminimalisatie).",
            unsafeUse: "Zonder menselijke controle ('Human in the loop') beslissende cijfers of oordelen laten genereren (AI-Act)."
          },
          { 
            id: 'other', 
            name: 'Een andere (onbekende) AI-tool', 
            dataTraining: true, 
            dpa: false,
            processingRisk: 'high',
            processingTerms: "Aanname van 'worst-case' scenario voor consumententools: data wordt in de VS verwerkt, gebruikt voor training (datalek-risico), en er ontbreekt een wettelijk verplichte Verwerkersovereenkomst.",
            safeUse: "Alleen generieke, openbare informatie invoeren (bijv. weerberichten, algemene formules of spellingscontrole).",
            unsafeUse: "Elke verwerking van persoonsgegevens, auteursrechtelijk materiaal of vertrouwelijke bestanden is onrechtmatig."
          },
        ];

        const DATA_TYPES = [
          { id: 'none', label: 'Geen persoonsgegevens', description: 'Algemene teksten, lesstof, anonieme voorbeelden.', riskLevel: 0 },
          { id: 'basic', label: 'Basis persoonsgegevens', description: 'Namen, e-mailadressen, of herleidbare context van studenten/collega\'s.', riskLevel: 1 },
          { id: 'sensitive', label: 'Gevoelige / Bijzondere persoonsgegevens', description: 'Cijfers, beoordelingen, medische gegevens, zorgdossiers of BSN-nummers.', riskLevel: 2 }
        ];

        const genericTextCases = [
          { id: 'txt1', label: 'Lesvoorbereidingen maken', levels: ['prep'], aiActHighRisk: false },
          { id: 'txt2', label: 'Lesmateriaal ontwikkelen', levels: ['prep', 'didactic'], aiActHighRisk: false },
          { id: 'txt3', label: 'Toetsen en quizzen ontwerpen', levels: ['prep', 'didactic'], aiActHighRisk: false },
          { id: 'txt4', label: 'Differentiëren', levels: ['didactic', 'guidance'], aiActHighRisk: false },
          { id: 'txt5', label: 'Administratie en correspondentie', levels: ['prep'], aiActHighRisk: false },
          { id: 'txt_fb', label: 'Nakijken of feedback schrijven (Let op!)', levels: ['prep', 'guidance'], aiActHighRisk: true },
        ];

        const USE_CASES_PER_TOOL = {
          chatgpt_free: genericTextCases,
          gemini_free: genericTextCases,
          gemini_edu: genericTextCases,
          copilot_edu: genericTextCases,
          claude: [
            { id: 'cl1', label: 'Bronnen analyseren (samenvatten)', levels: ['prep', 'didactic', 'guidance'], aiActHighRisk: false },
            { id: 'cl2', label: 'Feedback formuleren', levels: ['prep', 'guidance'], aiActHighRisk: true },
            { id: 'cl3', label: 'Differentiëren (zeer sterk in taalnuances)', levels: ['didactic', 'guidance'], aiActHighRisk: false },
          ],
          gamma: [
            { id: 'gam1', label: 'Presentaties maken', levels: ['prep', 'didactic'], aiActHighRisk: false },
            { id: 'gam2', label: 'Lesmateriaal ontwikkelen (visueel)', levels: ['prep', 'didactic'], aiActHighRisk: false },
          ],
          genially: [
            { id: 'gen1', label: 'Interactieve werkvormen maken', levels: ['didactic', 'prep'], aiActHighRisk: false },
            { id: 'gen2', label: 'Lesmateriaal ontwikkelen (interactief)', levels: ['didactic', 'prep'], aiActHighRisk: false },
          ],
          notebooklm: [
            { id: 'not1', label: 'Bronnen analyseren (vragen stellen over eigen PDF\'s/boeken)', levels: ['prep', 'didactic', 'guidance'], aiActHighRisk: false },
            { id: 'not2', label: 'Lesmateriaal ontwikkelen', levels: ['prep', 'didactic'], aiActHighRisk: false },
          ],
          heygen: [
            { id: 'hey1', label: 'Instructievideo\'s maken', levels: ['prep', 'didactic', 'guidance'], aiActHighRisk: false },
          ],
          midjourney: [
            { id: 'mid1', label: 'Beeldmateriaal genereren', levels: ['prep', 'didactic'], aiActHighRisk: false },
          ],
          other: [
            { id: 'oth1', label: 'Lesvoorbereiding en administratie', levels: ['prep'], aiActHighRisk: false },
            { id: 'oth2', label: 'Didactische inzet (presentaties, video)', levels: ['didactic'], aiActHighRisk: false },
            { id: 'oth3', label: 'Nakijken of begeleiden van leerlingen', levels: ['guidance', 'prep'], aiActHighRisk: true },
          ]
        };

        const getProcessingRiskStyles = (risk) => {
          switch(risk) {
            case 'high': 
              return { bg: 'bg-red-50 border-red-200', border: 'bg-red-500', icon: 'text-red-600', badge: 'bg-red-100 text-red-800', label: 'Hoog Risico (Openbaar/Geen DPA)' };
            case 'medium': 
              return { bg: 'bg-orange-50 border-orange-200', border: 'bg-orange-500', icon: 'text-orange-600', badge: 'bg-orange-100 text-orange-800', label: 'Gemiddeld Risico' };
            case 'low': 
              return { bg: 'bg-green-50 border-green-200', border: 'bg-green-500', icon: 'text-green-600', badge: 'bg-green-100 text-green-800', label: 'Laag Risico (Afgeschermd)' };
            default: 
              return { bg: 'bg-blue-50 border-blue-200', border: 'bg-blue-500', icon: 'text-blue-600', badge: 'bg-blue-100 text-blue-800', label: 'Onbekend' };
          }
        };

        function App() {
          const [activeTab, setActiveTab] = useState('wizard');
          const [history, setHistory] = useState([]);
          
          const [step, setStep] = useState(0);
          const [selectedTool, setSelectedTool] = useState('');
          const [useCase, setUseCase] = useState('');
          const [dataType, setDataType] = useState('');
          const [ipRisk, setIpRisk] = useState('');
          const [currentResult, setCurrentResult] = useState(null);
          
          const [showExtendedReport, setShowExtendedReport] = useState(false);

          // Zorgt ervoor dat de browser bij elke nieuwe stap of tab naar boven scrolt
          useEffect(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }, [step, activeTab]);

          const handleNext = () => setStep(prev => prev + 1);
          const handlePrev = () => setStep(prev => prev - 1);
          const handleReset = () => {
            setStep(0);
            setSelectedTool('');
            setUseCase('');
            setDataType('');
            setIpRisk('');
            setCurrentResult(null);
            setShowExtendedReport(false);
          };

          const getFilteredUseCases = () => {
            if (!selectedTool) return [];
            const casesForTool = USE_CASES_PER_TOOL[selectedTool] || USE_CASES_PER_TOOL['other'];
            const filtered = [...casesForTool];
            filtered.push({ id: 'custom_other', label: 'Anders...', aiActHighRisk: false });
            return filtered;
          };

          const calculateRiskLogic = () => {
            const tool = AI_TOOLS.find(t => t.id === selectedTool);
            const data = DATA_TYPES.find(d => d.id === dataType);
            const casesForTool = USE_CASES_PER_TOOL[selectedTool] || USE_CASES_PER_TOOL['other'];
            const allPossibleCases = [...casesForTool, { id: 'custom_other', label: 'Anders...', aiActHighRisk: false }];
            const uc = allPossibleCases.find(u => u.id === useCase);

            if (!tool || !data || !uc || !ipRisk) return null;

            let result = { level: 'low', title: '', color: '', icon: null, avgMessage: '', aiActMessage: '', actionable: [] };

            if (uc.aiActHighRisk) {
              result.aiActMessage = "De Europese AI-act classificeert AI gebruikt voor evaluatie of beoordeling van studenten als 'Hoog Risico' (Bijlage III). Je bent wettelijk verplicht te zorgen voor betekenisvolle menselijke tussenkomst (Human-in-the-loop). Volledig geautomatiseerde besluiten over studenten zijn verboden en er moet gelet worden op algoritmische bias (vooroordelen).";
            } else {
              result.aiActMessage = "Voor dit doel valt de inzet onder 'Beperkt Risico' of 'Minimaal Risico' in de AI-Act. Er geldt wel een transparantieverplichting: studenten moeten worden geïnformeerd als lesmateriaal of teksten door AI zijn gegenereerd of bewerkt.";
            }

            if (data.riskLevel === 2) {
              if (tool.dpa && !tool.dataTraining) {
                result.level = 'medium';
                result.title = 'Oranje: Overleg vereist (DPIA nodig)';
                result.avgMessage = 'Je verwerkt sterk gevoelige gegevens (zoals cijfers of medische data). Omdat je een beveiligde school-omgeving gebruikt is de data contractueel afgeschermd, maar voor dit type sterk gevoelige data is onder de AVG vrijwel altijd een Data Protection Impact Assessment (DPIA) vereist voorafgaand aan de verwerking.';
                result.color = 'bg-orange-100 border-orange-400 text-orange-800';
                result.icon = <i className="ph-fill ph-warning-circle text-[32px] text-orange-500"></i>;
                result.actionable = ['Controleer bij de FG of er een DPIA is uitgevoerd voor dit specifieke doel en deze tool.', 'Pas strikte dataminimalisatie toe.', 'Zorg voor een menselijke eindcontrole (Human-in-the-loop).'];
              } else {
                result.level = 'high';
                result.title = 'Rood: Niet toegestaan (Hoog Risico)';
                result.avgMessage = 'Het is onder de AVG ten strengste verboden om gevoelige persoonsgegevens in externe/commerciële AI-tools in te voeren. Deze data kan gebruikt worden voor het trainen van modellen en lekken naar derde partijen.';
                result.color = 'bg-red-100 border-red-400 text-red-800';
                result.icon = <i className="ph ph-shield text-[32px] text-red-600"></i>;
                result.actionable = ['Stop direct: gebruik deze tool niet voor dit doel.', 'Anonimiseer alle persoonsgegevens volledig (verwijder namen, context, cijfers) voordat je AI overweegt.', 'Raadpleeg de FG voor een goedgekeurd, intern alternatief.'];
              }
            } else if (data.riskLevel === 1) {
              if (tool.dataTraining || !tool.dpa) {
                result.level = 'high';
                result.title = 'Rood: Niet toegestaan (Datalek / Training)';
                result.avgMessage = `Je verwerkt persoonsgegevens in een tool (${tool.name}) zonder verwerkersovereenkomst en die mogelijk traint op jouw data. Dit is een inbreuk op de AVG (datalek/ongeoorloofde verwerking).`;
                result.color = 'bg-red-100 border-red-400 text-red-800';
                result.icon = <i className="ph ph-shield text-[32px] text-red-600"></i>;
                result.actionable = ['Gebruik een door de school goedgekeurd alternatief (bijv. interne Copilot/Gemini).', 'Vervang namen door fictieve letters (Student A, Student B) om te anonimiseren.'];
              } else {
                result.level = 'medium';
                result.title = 'Oranje: Veilig, mits terughoudend';
                result.avgMessage = `Je gebruikt een afgeschermde omgeving (${tool.name}). Contractueel is geborgd dat data niet gebruikt wordt voor training. De AVG staat dit toe, mits het noodzakelijk is voor je taak.`;
                result.color = 'bg-orange-100 border-orange-400 text-orange-800';
                result.icon = <i className="ph-fill ph-warning-circle text-[32px] text-orange-500"></i>;
                result.actionable = ['Minimaliseer gegevens: voer geen overbodige persoonsgegevens in.', 'Houd de output kritisch in de gaten op hallucinaties.', 'Zorg voor transparantie naar betrokkenen (studenten).'];
              }
            } else if (data.riskLevel === 0) {
              if (tool.dataTraining) {
                result.level = 'low-warning';
                result.title = 'Geel/Groen: Veilig (Let op IP & Auteursrecht)';
                result.avgMessage = 'Omdat je géén persoonsgegevens invoert, is de AVG niet van toepassing. Let op: jouw invoer kan wel gebruikt worden om de tool te trainen. Deel geen ongepubliceerd onderzoek of examens.';
                result.color = 'bg-green-100 border-green-400 text-green-800';
                result.icon = <i className="ph-fill ph-check-circle text-[32px] text-green-600"></i>;
                result.actionable = ['Je kunt veilig aan de slag.', 'Vermijd het delen van bedrijfsgeheimen of onuitgegeven toetsen.', 'Check feiten: AI kan output genereren die overtuigend maar onjuist is.'];
              } else {
                result.level = 'low';
                result.title = 'Groen: Veilig in gebruik';
                result.avgMessage = 'Je verwerkt geen persoonsgegevens in een afgeschermde omgeving. Zowel op het gebied van AVG als databeveiliging is dit de meest veilige optie.';
                result.color = 'bg-green-100 border-green-500 text-green-800';
                result.icon = <i className="ph-fill ph-check-circle text-[32px] text-green-600"></i>;
                result.actionable = ['Geen privacyrisico\'s geïdentificeerd. Veel succes met je taak!', 'Blijf voldoen aan de transparantie-eis (meld AI-gebruik).'];
              }
            }

            if (ipRisk === 'ip_secret') {
              if (!tool.dpa || tool.dataTraining) {
                result.level = 'high';
                result.title = 'Rood: Niet toegestaan (Informatiebeveiliging / BIO)';
                result.avgMessage = 'Waarschuwing! Je staat op het punt bedrijfsvertrouwelijke informatie (zoals geheime examens of beleidsstukken) te delen met een commerciële AI. Dit is een fors datalek en in strijd met het informatiebeveiligingsbeleid, ongeacht of er persoonsgegevens in zitten. ' + result.avgMessage;
                result.color = 'bg-red-100 border-red-400 text-red-800';
                result.icon = <i className="ph ph-shield text-[32px] text-red-600"></i>;
                result.actionable.unshift('Verwijder direct alle bedrijfsvertrouwelijke informatie of examenvragen uit je prompt.');
              } else {
                if (result.level !== 'high') {
                  result.level = 'medium';
                  result.title = 'Oranje: Veilig, maar wees alert op vertrouwelijkheid';
                  result.avgMessage += ' Let op: Je verwerkt bedrijfsvertrouwelijke informatie. Omdat dit een intern afgeschermde tool is, is er geen extern lek, maar wees terughoudend met het invoeren van bijvoorbeeld definitieve examens (ivm interne rechten).';
                  result.color = 'bg-orange-100 border-orange-400 text-orange-800';
                  result.icon = <i className="ph-fill ph-warning-circle text-[32px] text-orange-500"></i>;
                }
              }
            } else if (ipRisk === 'ip_copyright') {
               if (result.level !== 'high') {
                   result.level = 'medium';
                   result.title = 'Oranje: Risico op Auteursrechtenschending';
                   result.avgMessage += ' Let op: het uploaden van andermans beschermde werken (zoals uitgeverij-boeken of artikelen) kan een schending van het auteursrecht zijn, zéker als de tool de data gebruikt voor training.';
                   result.color = 'bg-orange-100 border-orange-400 text-orange-800';
                   result.icon = <i className="ph-fill ph-warning-circle text-[32px] text-orange-500"></i>;
                   result.actionable.unshift('Controleer of je toestemming hebt (of dat de citaatexceptie geldt) om dit auteursrechtelijk beschermde materiaal in een AI-tool te verwerken.');
               }
            }

            if (uc.aiActHighRisk && result.level !== 'high') {
              result.actionable.unshift('AI-ACT VEREISTE: Een docent móét het definitieve oordeel vellen. Het AI-voorstel mag slechts als advies dienen.');
            }

            return result;
          };

          const handleGenerateAssessment = () => {
            const res = calculateRiskLogic();
            setCurrentResult(res);
            setStep(5);
            
            const casesForTool = USE_CASES_PER_TOOL[selectedTool] || USE_CASES_PER_TOOL['other'];
            const allPossibleCases = [...casesForTool, { id: 'custom_other', label: 'Anders...', aiActHighRisk: false }];
            const selectedUc = allPossibleCases.find(u => u.id === useCase);

            const newEntry = {
              id: Date.now(),
              date: new Date().toLocaleString('nl-NL'),
              toolName: AI_TOOLS.find(t => t.id === selectedTool)?.name,
              useCaseName: selectedUc?.label,
              dataTypeName: DATA_TYPES.find(d => d.id === dataType)?.label,
              riskLevel: res.level,
              aiActFlag: selectedUc?.aiActHighRisk ? 'Hoog Risico (Bijlage III)' : 'Beperkt/Minimaal',
            };
            setHistory([newEntry, ...history]);
          };

          const handleExportPDF = () => {
            const element = document.getElementById('pdf-export-content');
            if (!element) return;
            const opt = {
              margin: 10,
              filename: `AVG_AI_Analyse_${Date.now()}.pdf`,
              image: { type: 'jpeg', quality: 0.98 },
              html2canvas: { scale: 2, useCORS: true },
              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            window.html2pdf().set(opt).from(element).save();
          };

          const activeTool = AI_TOOLS.find(t=>t.id===selectedTool);
          const toolRiskStyles = activeTool ? getProcessingRiskStyles(activeTool.processingRisk) : null;

          return (

                      <h2 className="text-2xl font-bold text-gray-800">FG / Privacy Officer Dashboard</h2>
                    </div>
                    
                    <p className="text-gray-600 mb-6">Overzicht van de inzet van AI-tools binnen de organisatie. In een productieomgeving worden deze gegevens centraal gelogd voor de verantwoordingsplicht (accountability) onder de AVG.</p>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                      <div className="bg-purple-50 p-5 rounded-xl border border-purple-100">
                        <div className="text-purple-800 text-sm font-bold mb-1">Totaal Aanvragen</div>
                        <div className="text-3xl font-extrabold text-purple-900">{history.length}</div>
                      </div>
                      <div className="bg-red-50 p-5 rounded-xl border border-red-100">
                        <div className="text-red-800 text-sm font-bold mb-1">Hoog Risico (AVG geblokkeerd)</div>
                        <div className="text-3xl font-extrabold text-red-900">{history.filter(h => h.riskLevel === 'high').length}</div>
                      </div>
                      <div className="bg-orange-50 p-5 rounded-xl border border-orange-100">
                        <div className="text-orange-800 text-sm font-bold mb-1">AI-Act 'Hoog Risico'</div>
                        <div className="text-3xl font-extrabold text-orange-900">{history.filter(h => h.aiActFlag.includes('Hoog')).length}</div>
                      </div>
                    </div>

                    <h3 className="font-bold text-gray-800 mb-3">Recente Registraties</h3>
                    <div className="overflow-x-auto border rounded-xl">
                      <table className="w-full text-left text-sm">
                        <thead className="bg-gray-50 border-b">
                          <tr>
                            <th className="p-3 font-semibold text-gray-600">Datum</th>
                            <th className="p-3 font-semibold text-gray-600">Tool</th>
                            <th className="p-3 font-semibold text-gray-600">Doel & Data</th>
                            <th className="p-3 font-semibold text-gray-600">Compliance Status</th>
                          </tr>
                        </thead>
                        <tbody>
                          {history.length === 0 ? (
                            <tr><td colSpan="4" className="p-4 text-center text-gray-500">Geen data beschikbaar</td></tr>
                          ) : history.map(item => (
                            <tr key={item.id} className="border-b last:border-0 hover:bg-gray-50">
                              <td className="p-3 text-gray-500">{item.date.split(',')[0]}</td>
                              <td className="p-3 font-medium">{item.toolName}</td>
                              <td className="p-3">
                                <div className="truncate w-48 text-gray-800 font-medium" title={item.useCaseName}>{item.useCaseName}</div>
                                <div className="text-xs text-gray-400 truncate w-48">{item.dataTypeName}</div>
                              </td>
                              <td className="p-3">
                                {item.riskLevel === 'high' ? <span className="text-red-600 font-bold">Afgewezen</span> : 
                                 item.riskLevel === 'medium' ? <span className="text-orange-600 font-bold">DPIA / Consult FG</span> :
                                 <span className="text-green-600 font-bold">Akkoord</span>}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
</html>
